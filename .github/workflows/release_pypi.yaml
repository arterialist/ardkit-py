name: Publish to PyPI

on:
  workflow_dispatch: null
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        run: pipx run build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure a Trusted Publisher for `ardkit-ai` at https://pypi.org/manage/account/publishing/
        # No API token needed once trusted publishing is set up.
